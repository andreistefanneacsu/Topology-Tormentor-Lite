name: Topology Tormentor Tests

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Linux dependencies for PyQt6
      run: sudo apt-get update && sudo apt-get install -y xvfb libegl1 libxcb-cursor0 libxkbcommon-x11-0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt PyQt6

    - name: Install the local project
      run: pip install -e .

    - name: Run tests with a virtual display
      env:
        QT_QPA_PLATFORM: offscreen
      run: xvfb-run pytest